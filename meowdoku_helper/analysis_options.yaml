# Dart/Flutter analysis — flutter_lints 6 base + MeowdokuHelper overrides.
# Generated FRB bindings are excluded; never edit lib/src/rust/ by hand.

include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gr.dart"
    - build/**
    - ios/**
    - android/**
    - linux/**
    - windows/**
    - macos/**
    - web/**
    - rust/**
    - lib/src/rust/**
    - rust_builder/**
    - julia/**
    - julia_bridge/**
    - gemini/**

  language:
    strict-casts: true
    strict-raw-types: true

  errors:
    missing_required_param: error
    missing_return: error
    unused_import: error
    unused_local_variable: error
    dead_code: error

linter:
  rules:
    always_use_package_imports: true
    avoid_print: true
    prefer_single_quotes: true
    require_trailing_commas: true
